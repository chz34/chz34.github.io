theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: c34's IT Temple
tagline: 技术笔记 · 工程实践
description: >-
  记录高性能计算、AI 框架等技术的学习与工程实践

url: "https://chz34.github.io"

github:
  username: chz34

social:
  name: chz34
  email: ""
  links:
    - https://github.com/chz34

# Light | dark | (leave empty to follow system preference)
theme_mode:

img_cdn: ""
avatar: ""

toc: true

comments:
  active: ""

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_count: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - HPF.md
  - mindspore.md
  - stylesheets/
  - tools/
  - docs/
